<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting to Eyeling Playground</title>
    <link rel="canonical" href="./playground" />
    <meta http-equiv="refresh" content="0; url=./playground" />
    <script>
      (() => {
        const target = new URL('./playground', window.location.href);
        target.search = window.location.search;
        target.hash = window.location.hash;
        window.location.replace(target.href);
      })();
    </script>
  </head>
  <body>
    <p>
      The Eyeling demo has moved to
      <a id="playground-link" href="./playground">the Eyeling Playground</a>.
    </p>
    <script>
      (() => {
        const link = document.getElementById('playground-link');
        if (!link) return;
        const target = new URL('./playground', window.location.href);
        target.search = window.location.search;
        target.hash = window.location.hash;
        link.href = target.href;
      })();
    </script>
  </body>
</html>
